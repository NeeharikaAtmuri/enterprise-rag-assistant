apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-rag-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-rag-assistant
  template:
    metadata:
      labels:
        app: enterprise-rag-assistant
    spec:
      containers:
      - name: app
        image: replace-with-your-image:latest
        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-rag-assistant-svc
spec:
  selector:
    app: enterprise-rag-assistant
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
